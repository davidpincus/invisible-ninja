<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Invisible Ninja</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script>
        window.onerror = function(msg, url, line, col, error) {
            var el = document.createElement('div');
            el.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:12px;background:red;color:white;font:14px monospace;z-index:99999;white-space:pre-wrap';
            el.textContent = msg + '\n' + url + ':' + line + ':' + col;
            document.body.appendChild(el);
        };
    </script>
</head>
<body>
    <div id="game-container"></div>

    <script src="js/sprites/SpriteGenerator.js"></script>
    <script src="js/sprites/TileGenerator.js"></script>
    <script src="js/systems/ProgressTracker.js"></script>

    <script src="js/systems/DialogSystem.js"></script>
    <script src="js/data/mathProblems.js"></script>
    <script src="js/data/npcs.js"></script>
    <script src="js/scenes/BootScene.js"></script>
    <script src="js/scenes/TitleScene.js"></script>
    <script src="js/scenes/WorldMapScene.js"></script>
    <script src="js/scenes/BaseLandScene.js"></script>
    <script src="js/scenes/EasterIslandScene.js"></script>
    <script src="js/scenes/HannukahIslandScene.js"></script>

    <script src="js/scenes/ThanksgivingIslandScene.js"></script>
    <script src="js/scenes/MegaMixIslandScene.js"></script>
    <script src="js/scenes/HalloweenPalaceScene.js"></script>
    <script src="js/scenes/DancePartyScene.js"></script>
    <script src="js/scenes/ThroneRoomScene.js"></script>
    <script src="js/scenes/VictoryScene.js"></script>
    <script src="js/scenes/MathChallengeScene.js"></script>
    <script src="js/scenes/HouseInteriorScene.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
